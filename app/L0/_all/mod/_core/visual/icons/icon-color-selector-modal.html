<html class="visual-icon-selector-modal-shell">
  <head>
    <title>Choose Icon</title>
    <link rel="stylesheet" href="/mod/_core/visual/icons/icon-color-selector.css" />
    <script type="module" src="/mod/_core/visual/icons/icon-color-selector.js"></script>
  </head>
  <body class="visual-icon-selector-modal-body">
    <section
      class="visual-icon-selector"
      x-data
      x-init="$nextTick(() => $store.visualIconColorSelector.focusSearchField($refs.search))"
    >
      <div class="visual-icon-selector-lead">
        <div
          class="visual-icon-selector-preview"
          :style="{ '--visual-icon-selector-color': $store.visualIconColorSelector.previewColorValue }"
        >
          <x-icon x-text="$store.visualIconColorSelector.previewIconName"></x-icon>
        </div>

        <div class="visual-icon-selector-lead-copy">
          <p class="visual-icon-selector-eyebrow">Selected Icon</p>
          <strong x-text="$store.visualIconColorSelector.selectionSummaryLabel"></strong>
          <p class="visual-icon-selector-help" x-text="$store.visualIconColorSelector.selectionHelpLabel"></p>
        </div>
      </div>

      <div class="visual-icon-selector-toolbar">
        <label class="visual-icon-selector-search">
          <span class="visual-icon-selector-field-label">Search</span>
          <input
            x-ref="search"
            type="search"
            class="visual-icon-selector-search-input"
            placeholder="Search Material icons"
            x-model="$store.visualIconColorSelector.searchDraft"
            @input="$store.visualIconColorSelector.handleSearchInput()"
          />
        </label>

        <label class="visual-icon-selector-color">
          <span class="visual-icon-selector-field-label">Color</span>
          <div class="visual-icon-selector-color-row">
            <input
              type="color"
              class="visual-icon-selector-color-input"
              :value="$store.visualIconColorSelector.colorInputValue"
              @input="$store.visualIconColorSelector.updateColor($event.target.value)"
            />
            <span class="visual-icon-selector-color-value" x-text="$store.visualIconColorSelector.colorValueLabel"></span>
          </div>
        </label>
      </div>

      <template x-if="$store.visualIconColorSelector.loadingCatalog">
        <p class="visual-icon-selector-status">Loading Material icons…</p>
      </template>

      <template x-if="!$store.visualIconColorSelector.loadingCatalog && $store.visualIconColorSelector.loadErrorText">
        <p class="visual-icon-selector-status is-error" x-text="$store.visualIconColorSelector.loadErrorText"></p>
      </template>

      <template x-if="!$store.visualIconColorSelector.loadingCatalog && !$store.visualIconColorSelector.loadErrorText">
        <div class="visual-icon-selector-results">
          <div class="visual-icon-selector-results-toolbar">
            <button
              x-show="$store.visualIconColorSelector.allowNone"
              x-cloak
              type="button"
              class="visual-icon-selector-none-button"
              :class="{ 'is-selected': $store.visualIconColorSelector.isNoneSelected }"
              @click="$store.visualIconColorSelector.selectNone()"
            >
              <x-icon>hide_image</x-icon>
              <span>None</span>
            </button>

            <p class="visual-icon-selector-results-summary" x-text="$store.visualIconColorSelector.pageSummary"></p>
          </div>

          <div class="visual-icon-selector-grid">
            <template x-for="iconName in $store.visualIconColorSelector.visibleIcons" :key="iconName">
              <button
                type="button"
                class="visual-icon-selector-option"
                :class="{ 'is-selected': iconName === $store.visualIconColorSelector.selectedIcon }"
                :title="$store.visualIconColorSelector.formatIconOptionLabel(iconName)"
                @click="$store.visualIconColorSelector.selectIcon(iconName)"
              >
                <span class="visual-icon-selector-option-icon">
                  <x-icon x-text="iconName"></x-icon>
                </span>
                <span class="visual-icon-selector-option-label" x-text="$store.visualIconColorSelector.formatIconOptionLabel(iconName)"></span>
              </button>
            </template>
          </div>

          <div class="visual-icon-selector-pagination">
            <button
              type="button"
              class="visual-icon-selector-page-button"
              :disabled="!$store.visualIconColorSelector.canGoToPreviousPage"
              aria-label="Previous page"
              @click="$store.visualIconColorSelector.goToPreviousPage()"
            >
              <x-icon>chevron_left</x-icon>
            </button>

            <span class="visual-icon-selector-pagination-label" x-text="$store.visualIconColorSelector.paginationLabel"></span>

            <button
              type="button"
              class="visual-icon-selector-page-button"
              :disabled="!$store.visualIconColorSelector.canGoToNextPage"
              aria-label="Next page"
              @click="$store.visualIconColorSelector.goToNextPage()"
            >
              <x-icon>chevron_right</x-icon>
            </button>
          </div>
        </div>
      </template>

      <div data-modal-footer class="visual-icon-selector-footer">
        <button
          type="button"
          class="secondary-button"
          x-text="$store.visualIconColorSelector.resetButtonLabel"
          @click="void $store.visualIconColorSelector.resetToDefaults()"
        ></button>

        <div class="visual-icon-selector-footer-actions">
          <button type="button" class="secondary-button" @click="void $store.visualIconColorSelector.cancelSelection()">
            Cancel
          </button>
          <button type="button" class="primary-button" @click="void $store.visualIconColorSelector.applySelection()">
            Apply
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
