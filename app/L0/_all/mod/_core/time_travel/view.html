<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/time_travel/time-travel.css" />
    <script type="module" src="/mod/_core/time_travel/store.js"></script>
  </head>
  <body>
    <section
      class="space-panel time-travel-page"
      x-data
      x-init="$nextTick(() => { $store.timeTravel.mount({ actionDialog: $refs.actionDialog, diffDialog: $refs.diffDialog, repositoryDialog: $refs.repositoryDialog }); $store.timeTravel.init(); })"
    >
      <template x-inject='[id="_core/onscreen_menu/bar_start"]'>
        <div x-cloak data-order="300" class="time-travel-topbar-controls">
          <button
            type="button"
            class="space-topbar-button time-travel-refresh"
            :disabled="$store.timeTravel.loading || $store.timeTravel.rollingBack || $store.timeTravel.reverting"
            aria-label="Refresh history"
            title="Refresh history"
            @click="$store.timeTravel.refreshHistory()"
          >
            <x-icon x-text="$store.timeTravel.loading ? 'hourglass_top' : 'refresh'"></x-icon>
            <span x-text="$store.timeTravel.loading ? 'Loading...' : 'Refresh'"></span>
          </button>
          <button
            type="button"
            class="space-topbar-button time-travel-repository-button"
            :disabled="$store.timeTravel.rollingBack || $store.timeTravel.reverting"
            :aria-label="`Choose Git repository (${ $store.timeTravel.currentRepositoryName })`"
            :title="`Choose Git repository (${ $store.timeTravel.currentRepositoryName })`"
            @click="$store.timeTravel.openRepositoryDialog()"
          >
            <x-icon>folder_open</x-icon>
            <span x-text="$store.timeTravel.currentRepositoryName"></span>
          </button>
        </div>
      </template>

      <div class="time-travel-shell">
        <header class="time-travel-header">
          <h1 class="time-travel-title">Time Travel</h1>
          <p class="time-travel-subtitle">
            Time Travel lets you undo your changes, including settings, spaces, and custom development.
          </p>
        </header>

        <div class="time-travel-grid">
          <aside class="time-travel-sidebar" aria-label="History commits">
            <div class="time-travel-panel-heading time-travel-commit-heading">
              <h2>Commits</h2>
              <form class="time-travel-filter" @submit.prevent="$store.timeTravel.applyFileFilter()">
                <x-icon>search</x-icon>
                <input
                  type="search"
                  aria-label="Filter commits by file"
                  placeholder="Filter by file"
                  x-model="$store.timeTravel.fileFilter"
                />
                <button
                  type="button"
                  class="time-travel-filter-clear"
                  x-show="$store.timeTravel.fileFilter"
                  @click="$store.timeTravel.clearFileFilter()"
                  aria-label="Clear file filter"
                >
                  <x-icon>close</x-icon>
                </button>
              </form>
            </div>

            <template x-if="$store.timeTravel.loading">
              <div class="time-travel-empty">
                <x-icon>hourglass_top</x-icon>
                <p>Loading history...</p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.loading && $store.timeTravel.errorText">
              <div class="time-travel-empty">
                <x-icon>error</x-icon>
                <p x-text="$store.timeTravel.errorText"></p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.loading && !$store.timeTravel.errorText && !$store.timeTravel.hasCommits">
              <div class="time-travel-empty">
                <x-icon>history</x-icon>
                <p x-text="$store.timeTravel.fileFilter ? 'No changes match that file filter.' : 'No history yet. Make a change after Time Travel is enabled.'"></p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.loading && !$store.timeTravel.errorText && $store.timeTravel.hasCommits">
              <div class="time-travel-commit-list">
                <template x-for="commit in $store.timeTravel.commits" :key="commit.hash">
                  <button
                    type="button"
                    class="time-travel-commit-button"
                    :class="{
                      'is-current': $store.timeTravel.isCurrentCommit(commit),
                      'is-selected': $store.timeTravel.isSelectedCommit(commit)
                    }"
                    :aria-current="$store.timeTravel.isSelectedCommit(commit) ? 'true' : 'false'"
                    @click="$store.timeTravel.selectCommit(commit)"
                  >
                    <span class="time-travel-node" aria-hidden="true">
                      <span class="time-travel-node-dot"></span>
                      <span class="time-travel-node-line"></span>
                    </span>

                    <span class="time-travel-commit-copy">
                      <span class="time-travel-commit-time-row">
                        <span class="time-travel-commit-relative" x-text="$store.timeTravel.formatRelativeTimestamp(commit.timestamp)"></span>
                        <template x-if="$store.timeTravel.isCurrentCommit(commit)">
                          <span class="time-travel-current-pill">Current</span>
                        </template>
                        <span class="time-travel-commit-date" x-text="$store.timeTravel.formatFullTimestamp(commit.timestamp)"></span>
                      </span>

                      <span
                        class="time-travel-file-preview"
                        x-init="$store.timeTravel.registerPreviewElement($el, commit)"
                      >
                        <template x-if="$store.timeTravel.getRemainingFileCount(commit)">
                          <span class="time-travel-file-pill is-more" x-text="`+${$store.timeTravel.getRemainingFileCount(commit)} more`"></span>
                        </template>
                        <template x-for="file in $store.timeTravel.getPreviewFiles(commit)" :key="`${commit.hash}:${file.path}`">
                          <span
                            class="time-travel-file-pill"
                            :class="$store.timeTravel.getFileActionClass(file)"
                            :title="`${$store.timeTravel.getFileActionLabel(file)} ${file.path}`"
                          >
                            <span x-text="file.name"></span>
                          </span>
                        </template>
                      </span>
                    </span>
                  </button>
                </template>
              </div>
            </template>

            <div class="time-travel-pagination">
              <button
                type="button"
                class="secondary-button time-travel-page-button"
                :disabled="!$store.timeTravel.canGoPreviousPage"
                @click="$store.timeTravel.goToPreviousPage()"
              >
                <x-icon>chevron_left</x-icon>
                <span>Previous</span>
              </button>
              <span class="time-travel-page-count" x-text="$store.timeTravel.pageLabel"></span>
              <button
                type="button"
                class="secondary-button time-travel-page-button"
                :disabled="!$store.timeTravel.canGoNextPage"
                @click="$store.timeTravel.goToNextPage()"
              >
                <span>Next</span>
                <x-icon>chevron_right</x-icon>
              </button>
            </div>
          </aside>

          <section class="time-travel-detail" aria-label="Selected commit details">
            <header class="time-travel-detail-header">
              <div
                class="time-travel-selected-meta"
                :class="{ 'is-current': $store.timeTravel.isCurrentCommit($store.timeTravel.selectedCommit) }"
              >
                <span class="time-travel-selected-hash" x-text="$store.timeTravel.selectedCommit?.shortHash || 'No commit'"></span>
                <template x-if="$store.timeTravel.isCurrentCommit($store.timeTravel.selectedCommit)">
                  <span class="time-travel-current-pill">Current</span>
                </template>
                <span x-text="$store.timeTravel.selectedCommit ? $store.timeTravel.formatRelativeTimestamp($store.timeTravel.selectedCommit.timestamp) : ''"></span>
                <span x-text="$store.timeTravel.selectedCommit ? $store.timeTravel.formatFullTimestamp($store.timeTravel.selectedCommit.timestamp) : ''"></span>
                <span
                  class="time-travel-selected-count is-added"
                  x-show="$store.timeTravel.selectedFileActionCounts.added"
                  x-text="`${$store.timeTravel.selectedFileActionCounts.added} added`"
                ></span>
                <span
                  class="time-travel-selected-count is-modified"
                  x-show="$store.timeTravel.selectedFileActionCounts.modified"
                  x-text="`${$store.timeTravel.selectedFileActionCounts.modified} modified`"
                ></span>
                <span
                  class="time-travel-selected-count is-deleted"
                  x-show="$store.timeTravel.selectedFileActionCounts.deleted"
                  x-text="`${$store.timeTravel.selectedFileActionCounts.deleted} deleted`"
                ></span>
              </div>

              <div class="time-travel-header-actions">
                <div class="time-travel-action-button-group">
                  <button
                    type="button"
                    class="primary-button"
                    :disabled="!$store.timeTravel.canRollback"
                    @click="$store.timeTravel.openActionDialog('travel')"
                  >
                    <x-icon x-text="$store.timeTravel.rollingBack ? 'hourglass_top' : 'settings_backup_restore'"></x-icon>
                    <span x-text="$store.timeTravel.rollingBack ? 'Travelling...' : 'Travel In Time'"></span>
                  </button>
                  <button
                    type="button"
                    class="secondary-button"
                    :disabled="!$store.timeTravel.canRevert"
                    @click="$store.timeTravel.openActionDialog('revert')"
                  >
                    <x-icon x-text="$store.timeTravel.reverting ? 'hourglass_top' : 'undo'"></x-icon>
                    <span x-text="$store.timeTravel.reverting ? 'Reverting...' : 'Revert Changes'"></span>
                  </button>
                </div>
              </div>
            </header>

            <div class="time-travel-detail-body">
              <template x-if="$store.timeTravel.selectedCommit && $store.timeTravel.selectedChangedFiles.length">
                <ul class="time-travel-file-list">
                  <template x-for="file in $store.timeTravel.selectedChangedFiles" :key="file.path">
                    <li>
                      <button
                        type="button"
                        class="time-travel-file-item"
                        :class="$store.timeTravel.getFileActionClass(file)"
                        @click="$store.timeTravel.openFileDiff(file)"
                      >
                        <x-icon x-text="$store.timeTravel.getFileActionIcon(file)"></x-icon>
                        <span class="time-travel-file-copy">
                          <span class="time-travel-file-name" x-text="file.name"></span>
                          <span class="time-travel-file-path" x-text="file.path"></span>
                        </span>
                        <span class="time-travel-file-action" x-text="$store.timeTravel.getFileActionLabel(file)"></span>
                      </button>
                    </li>
                  </template>
                </ul>
              </template>

              <template x-if="$store.timeTravel.selectedCommit && !$store.timeTravel.selectedChangedFiles.length">
                <div class="time-travel-empty">
                  <x-icon>draft</x-icon>
                  <p>This point has no visible changed files after history ignore rules.</p>
                </div>
              </template>

              <template x-if="!$store.timeTravel.selectedCommit">
                <div class="time-travel-empty">
                  <x-icon>travel_explore</x-icon>
                  <p>Select a point in time to inspect its changed files.</p>
                </div>
              </template>
            </div>

            <footer class="time-travel-actions">
              <p
                class="time-travel-status"
                :class="{
                  'is-error': $store.timeTravel.statusTone === 'error',
                  'is-success': $store.timeTravel.statusTone === 'success'
                }"
                x-text="$store.timeTravel.statusText"
              ></p>
            </footer>
          </section>
        </div>
      </div>

      <dialog class="time-travel-action-dialog" x-ref="actionDialog" @close="$store.timeTravel.resetActionDialog()">
        <div class="time-travel-action-card">
          <header class="time-travel-diff-header">
            <div>
              <p class="time-travel-diff-eyebrow" x-text="$store.timeTravel.actionModalEyebrow"></p>
              <h2 x-text="$store.timeTravel.actionModalTitle"></h2>
            </div>
            <button type="button" class="secondary-button time-travel-diff-close" @click="$store.timeTravel.closeActionDialog()">
              <x-icon>close</x-icon>
              <span>Close</span>
            </button>
          </header>

          <div class="time-travel-action-body">
            <p class="time-travel-action-description" x-text="$store.timeTravel.actionModalDescription"></p>

            <template x-if="$store.timeTravel.actionPreviewLoading">
              <div class="time-travel-empty">
                <x-icon>hourglass_top</x-icon>
                <p>Loading affected files...</p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.actionPreviewLoading && $store.timeTravel.actionPreviewErrorText">
              <div class="time-travel-empty time-travel-action-error">
                <x-icon>error</x-icon>
                <div class="time-travel-action-error-copy">
                  <p x-text="$store.timeTravel.actionPreviewErrorText"></p>
                  <template x-if="$store.timeTravel.actionPreviewErrorHint">
                    <p class="time-travel-action-error-hint" x-text="$store.timeTravel.actionPreviewErrorHint"></p>
                  </template>
                  <template x-if="$store.timeTravel.actionPreviewErrorDetails">
                    <details class="time-travel-action-error-details">
                      <summary>Show technical details</summary>
                      <pre x-text="$store.timeTravel.actionPreviewErrorDetails"></pre>
                    </details>
                  </template>
                </div>
              </div>
            </template>

            <template x-if="!$store.timeTravel.actionPreviewLoading && !$store.timeTravel.actionPreviewErrorText && $store.timeTravel.actionPreviewChangedFiles.length">
              <ul class="time-travel-file-list">
                <template x-for="file in $store.timeTravel.actionPreviewChangedFiles" :key="file.path">
                  <li>
                    <button
                      type="button"
                      class="time-travel-file-item"
                      :class="$store.timeTravel.getFileActionClass(file)"
                      @click="$store.timeTravel.openActionFileDiff(file)"
                    >
                      <x-icon x-text="$store.timeTravel.getFileActionIcon(file)"></x-icon>
                      <span class="time-travel-file-copy">
                        <span class="time-travel-file-name" x-text="file.name"></span>
                        <span class="time-travel-file-path" x-text="file.path"></span>
                      </span>
                      <span class="time-travel-file-action" x-text="$store.timeTravel.getFileActionLabel(file)"></span>
                    </button>
                  </li>
                </template>
              </ul>
            </template>

            <template x-if="!$store.timeTravel.actionPreviewLoading && !$store.timeTravel.actionPreviewErrorText && !$store.timeTravel.actionPreviewChangedFiles.length">
              <div class="time-travel-empty">
                <x-icon>check_circle</x-icon>
                <p>No visible files would change.</p>
              </div>
            </template>
          </div>

          <footer class="time-travel-action-footer">
            <button type="button" class="secondary-button time-travel-diff-close" @click="$store.timeTravel.closeActionDialog()">
              <span>Cancel</span>
            </button>
            <button
              type="button"
              class="primary-button time-travel-diff-close"
              :disabled="!$store.timeTravel.canConfirmAction"
              @click="$store.timeTravel.confirmAction()"
            >
              <x-icon x-text="$store.timeTravel.actionConfirmIcon"></x-icon>
              <span x-text="$store.timeTravel.actionConfirmLabel"></span>
            </button>
          </footer>
        </div>
      </dialog>

      <dialog class="time-travel-repository-dialog" x-ref="repositoryDialog">
        <div class="time-travel-repository-card">
          <header class="time-travel-diff-header">
            <div>
              <p class="time-travel-diff-eyebrow time-travel-repository-eyebrow">Select Time Travel scope (git repository folder)</p>
              <h2>Repository</h2>
            </div>
            <button type="button" class="secondary-button time-travel-diff-close" @click="$store.timeTravel.closeRepositoryDialog()">
              <x-icon>close</x-icon>
              <span>Close</span>
            </button>
          </header>

          <div class="time-travel-repository-body">
            <template x-if="$store.timeTravel.repositoryLoading">
              <div class="time-travel-empty">
                <x-icon>hourglass_top</x-icon>
                <p>Finding writable Git repositories...</p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.repositoryLoading && $store.timeTravel.repositoryErrorText">
              <div class="time-travel-empty">
                <x-icon>error</x-icon>
                <p x-text="$store.timeTravel.repositoryErrorText"></p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.repositoryLoading && !$store.timeTravel.repositoryErrorText && !$store.timeTravel.hasRepositories">
              <div class="time-travel-empty">
                <x-icon>folder_off</x-icon>
                <p>No writable Git repositories found.</p>
              </div>
            </template>

            <template x-if="!$store.timeTravel.repositoryLoading && !$store.timeTravel.repositoryErrorText && $store.timeTravel.hasRepositories">
              <ul class="time-travel-repository-list">
                <template x-for="repository in $store.timeTravel.repositories" :key="repository.id">
                  <li>
                    <button
                      type="button"
                      class="time-travel-repository-item"
                      :class="{ 'is-current': $store.timeTravel.isCurrentRepository(repository) }"
                      :disabled="$store.timeTravel.loading || $store.timeTravel.rollingBack || $store.timeTravel.reverting"
                      @click="$store.timeTravel.selectRepository(repository)"
                    >
                      <x-icon x-text="repository.icon"></x-icon>
                      <span class="time-travel-file-copy">
                        <span class="time-travel-file-name" x-text="repository.label"></span>
                        <span class="time-travel-file-path" x-text="repository.path"></span>
                      </span>
                      <template x-if="$store.timeTravel.isCurrentRepository(repository)">
                        <span class="time-travel-current-pill">Current</span>
                      </template>
                    </button>
                  </li>
                </template>
              </ul>
            </template>
          </div>
        </div>
      </dialog>

      <dialog class="time-travel-diff-dialog" x-ref="diffDialog" @close="$store.timeTravel.diffLoading = false">
        <div class="time-travel-diff-card">
          <header class="time-travel-diff-header">
            <div>
              <p class="time-travel-diff-eyebrow" x-text="$store.timeTravel.diffFile ? $store.timeTravel.getFileActionLabel($store.timeTravel.diffFile) : 'Diff'"></p>
              <h2 x-text="$store.timeTravel.diffFile?.path || 'File diff'"></h2>
            </div>
            <button type="button" class="secondary-button time-travel-diff-close" @click="$store.timeTravel.closeDiffDialog()">
              <x-icon>close</x-icon>
              <span>Close</span>
            </button>
          </header>

          <div class="time-travel-diff-body">
            <template x-if="$store.timeTravel.diffLoading">
              <div class="time-travel-empty">
                <x-icon>hourglass_top</x-icon>
                <p>Loading diff...</p>
              </div>
            </template>
            <template x-if="!$store.timeTravel.diffLoading && $store.timeTravel.diffErrorText">
              <div class="time-travel-empty">
                <x-icon>error</x-icon>
                <p x-text="$store.timeTravel.diffErrorText"></p>
              </div>
            </template>
            <template x-if="!$store.timeTravel.diffLoading && !$store.timeTravel.diffErrorText && $store.timeTravel.diffNoticeText">
              <div class="time-travel-empty">
                <x-icon>notes</x-icon>
                <p x-text="$store.timeTravel.diffNoticeText"></p>
              </div>
            </template>
            <template x-if="!$store.timeTravel.diffLoading && !$store.timeTravel.diffErrorText && !$store.timeTravel.diffNoticeText">
              <div class="time-travel-diff-output" aria-label="File diff">
                <template x-for="line in $store.timeTravel.diffLines" :key="line.id">
                  <span
                    class="time-travel-diff-line"
                    :class="`is-${line.type}`"
                    x-text="line.text"
                  ></span>
                </template>
              </div>
            </template>
          </div>
        </div>
      </dialog>
    </section>
  </body>
</html>
