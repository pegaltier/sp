<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/dashboard/dashboard.css" />
  </head>
  <body>
    <section class="space-panel dashboard-view" x-data>
      <template x-inject='[id="_core/onscreen_menu/bar_start"]'>
        <div class="dashboard-topbar-controls">
          <x-extension id="_core/dashboard/topbar_primary"></x-extension>
          <x-extension id="_core/dashboard/topbar_secondary"></x-extension>
        </div>
      </template>

      <div class="dashboard-shell">
        <div class="dashboard-stack">
          <x-extension id="_core/dashboard/content_start"></x-extension>
          <x-extension id="_core/dashboard/content_middle"></x-extension>
          <x-extension id="_core/dashboard/content_end"></x-extension>
        </div>
      </div>
    </section>
  </body>
</html>
