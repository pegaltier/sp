examples:
  - text: What's the weather here?
    kind: chat
    icon: chat_bubble
    color: "#7dc6ff"
    code: |
      await helpers.submitPrompt(example.text)
  - text: Retro Arcade
    kind: widget
    icon: gamepad
    color: "#00ffd5"
    code: |
      const currentSpace = helpers.getSpaceRuntime().current
      const spacesRuntime = helpers.getSpacesRuntime()
      const shouldRenameSpace = currentSpace && !String(currentSpace.title || "").trim()
      if (shouldRenameSpace && currentSpace?.id) {
        await spacesRuntime.saveSpaceMeta({ id: currentSpace.id, title: example.text, refresh: false })
      }
      await helpers.installOnboardingExampleWidgets([
        "retro-arcade/tetris-game.yaml",
        "retro-arcade/minesweeper-game.yaml",
        "retro-arcade/snake-game.yaml",
        "retro-arcade/retro-marquee.yaml"
      ])
