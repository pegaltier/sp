<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/web_browsing/window.css" />
    <script type="module" src="/mod/_core/web_browsing/store.js"></script>
  </head>
  <body>
    <div
      x-data
      class="web-browsing-overlay"
      x-cloak
      x-init="$store.webBrowsing.mount()"
      x-destroy="$store.webBrowsing.unmount()"
      x-show="$store.webBrowsing.hasOpenWindows"
      @pointermove.window="$store.webBrowsing.handlePointerMove($event)"
      @pointerup.window="$store.webBrowsing.stopPointer($event)"
      @pointercancel.window="$store.webBrowsing.stopPointer($event)"
      @resize.window="$store.webBrowsing.handleViewportResize()"
    >
      <x-context :data-tags="$store.webBrowsing.hasOpenBrowsers ? 'browser:open' : ''"></x-context>
      <template x-for="browserWindow in $store.webBrowsing.windows" :key="browserWindow.id">
        <section
          class="web-browsing-window"
          :class="{
            'is-dragging': $store.webBrowsing.interaction?.type === 'drag' && $store.webBrowsing.interaction?.windowId === browserWindow.id,
            'is-minimized': browserWindow.isMinimized,
            'is-resizing': $store.webBrowsing.interaction?.type === 'resize' && $store.webBrowsing.interaction?.windowId === browserWindow.id
          }"
          :style="$store.webBrowsing.panelStyle(browserWindow.id)"
          @pointerdown="$store.webBrowsing.handleWindowPointerDown(browserWindow.id, $event)"
        >
          <header
            class="web-browsing-window-titlebar"
            :aria-label="`Browser window controls for ${browserWindow.id}`"
            @pointerdown="$store.webBrowsing.startDrag(browserWindow.id, $event)"
          >
            <button
              type="button"
              class="web-browsing-window-control web-browsing-window-control-create"
              aria-label="Open another browser window"
              title="New window"
              @pointerdown.stop
              @click.stop="$store.webBrowsing.createWindow()"
            >
              <x-icon>add</x-icon>
            </button>

            <div class="web-browsing-window-title">
              <strong x-text="browserWindow.id"></strong>
            </div>

            <div class="web-browsing-window-controls">
              <button
                type="button"
                class="web-browsing-window-control"
                :aria-label="browserWindow.isMinimized ? `Restore ${browserWindow.id}` : `Minimize ${browserWindow.id}`"
                :title="browserWindow.isMinimized ? 'Restore' : 'Minimize'"
                @pointerdown.stop
                @click.stop="$store.webBrowsing.toggleMinimized(browserWindow.id)"
              >
                <x-icon x-text="browserWindow.isMinimized ? 'open_in_full' : 'remove'"></x-icon>
              </button>

              <button
                type="button"
                class="web-browsing-window-control web-browsing-window-control-close"
                :aria-label="`Close ${browserWindow.id}`"
                title="Close"
                @pointerdown.stop
                @click.stop="$store.webBrowsing.closeWindow(browserWindow.id)"
              >
                <x-icon>close</x-icon>
              </button>
            </div>
          </header>

          <div class="web-browsing-window-body">
            <x-browser
              class="web-browsing-window-browser"
              controls="true"
              :src="browserWindow.frameSrc"
              :data-browser-id="browserWindow.id"
            ></x-browser>
          </div>

          <button
            type="button"
            class="web-browsing-resize-handle"
            aria-label="Resize browser window"
            title="Resize"
            @pointerdown.stop="$store.webBrowsing.startResize(browserWindow.id, $event)"
          ></button>
        </section>
      </template>
    </div>
  </body>
</html>
