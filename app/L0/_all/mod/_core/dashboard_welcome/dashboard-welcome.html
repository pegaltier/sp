<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/dashboard_welcome/dashboard-welcome.css" />
    <script type="module" src="/mod/_core/dashboard_welcome/dashboard-welcome.js"></script>
  </head>
  <body>
    <section class="dashboard-welcome" x-data="dashboardWelcome()" x-init="init()" x-cloak>
      <template x-if="ready && !hidden">
        <div class="space-card dashboard-welcome-panel">
          <button
            type="button"
            class="secondary-button dashboard-welcome-dismiss"
            :disabled="savingPreference || isInstalling"
            aria-label="Hide welcome panel"
            @click="hideWelcome()"
          >
            <x-icon>close</x-icon>
          </button>

          <div class="dashboard-welcome-content">
            <div class="dashboard-welcome-copy">
              <p class="page-eyebrow">Welcome</p>
              <h2>Start by trying out some of the demos</h2>
            </div>

            <div class="dashboard-welcome-examples">
              <template x-for="example in examples" :key="example.id">
                <button
                  type="button"
                  class="dashboard-welcome-example"
                  :disabled="Boolean(installingExampleId)"
                  @click="installExample(example.id)"
                >
                  <span
                    class="dashboard-welcome-example-icon"
                    :style="{ '--dashboard-welcome-example-icon-color': example.displayIconColor }"
                  >
                    <x-icon x-text="example.displayIcon"></x-icon>
                  </span>

                  <div class="dashboard-welcome-example-copy">
                    <h3 x-text="example.title"></h3>
                    <p x-text="example.description"></p>
                  </div>

                  <span class="dashboard-welcome-example-arrow" aria-hidden="true">
                    <x-icon x-text="installingExampleId === example.id ? 'hourglass_top' : 'arrow_forward'"></x-icon>
                  </span>
                </button>
              </template>
            </div>
          </div>
        </div>
      </template>

      <template x-if="ready && hidden">
        <div class="dashboard-welcome-hidden">
          <button
            type="button"
            class="secondary-button"
            :disabled="savingPreference || isInstalling"
            @click="showWelcome()"
          >
            <x-icon>visibility</x-icon>
            <span>Welcome</span>
          </button>
        </div>
      </template>
    </section>
  </body>
</html>
