cols: 12
id: retro-marquee
name: "Retro Marquee"
renderer: |
  async (parent, spaceRef) => {
      parent.style.cssText = "background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100%;border:2px solid #ff00ff;box-shadow:0 0 6px #ff00ff;box-sizing:border-box;";
  
      const style = document.createElement("style");
      style.textContent = [
        "@keyframes rglow { 0%,100% { text-shadow: 0 0 3px #ff0, 0 0 6px #ff6600; } 50% { text-shadow: 0 0 5px #ff0, 0 0 10px #ff6600; } }",
        "@keyframes rflicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.7} 94%{opacity:1} 96%{opacity:0.5} 97%{opacity:1} }",
        "@keyframes rslide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }",
        ".rmslide { display:inline-block; white-space:nowrap; font-family:'Courier New',Consolas,monospace; font-weight:800; font-size:36px; color:#ffff00; letter-spacing:3px; animation: rslide 8s linear 1 forwards, rglow 1.5s ease-in-out infinite, rflicker 4s step-end infinite; }",
        ".rmstatic { display:block; white-space:nowrap; font-family:'Courier New',Consolas,monospace; font-weight:800; color:#ffff00; letter-spacing:2px; animation: rglow 1.5s ease-in-out infinite, rflicker 4s step-end infinite; text-align:center; }",
        ".rscanlines { position:absolute; inset:0; background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.2) 3px,rgba(0,0,0,0.2) 4px); pointer-events:none; z-index:2; }"
      ].join("\n");
      parent.appendChild(style);
  
      const wrapper = document.createElement("div");
      wrapper.style.cssText = "position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0 16px;box-sizing:border-box;";
  
      const scanlines = document.createElement("div");
      scanlines.className = "rscanlines";
      wrapper.appendChild(scanlines);
  
      const MSG = "\u2605  All of these incredible games were generated by Space Agent, enjoy!  \u2605";
  
      // Phase 1: sliding text
      const sliding = document.createElement("span");
      sliding.className = "rmslide";
      sliding.textContent = MSG;
      wrapper.appendChild(sliding);
      parent.appendChild(wrapper);
  
      const fit = (el) => {
        const available = wrapper.clientWidth - 32;
        const available_h = wrapper.clientHeight - 8;
        let size = 48;
        el.style.fontSize = size + "px";
        while ((el.scrollWidth > available || el.scrollHeight > available_h) && size > 6) {
          size -= 0.5;
          el.style.fontSize = size + "px";
        }
      };
  
      // Phase 2: after slide finishes, swap to static fitted text
      const switchToStatic = () => {
        wrapper.removeChild(sliding);
  
        const text = document.createElement("span");
        text.className = "rmstatic";
        text.textContent = MSG;
        wrapper.appendChild(text);
  
        const doFit = () => fit(text);
  
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(doFit);
        } else {
          setTimeout(doFit, 100);
        }
  
        const ro = new ResizeObserver(doFit);
        ro.observe(wrapper);
        wrapper._ro = ro;
      };
  
      sliding.addEventListener("animationend", (e) => {
        if (e.animationName === "rslide") switchToStatic();
      });
  
      return () => {
        if (wrapper._ro) wrapper._ro.disconnect();
      };
    }
rows: 2
