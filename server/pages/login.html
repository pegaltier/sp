<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Agent Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        --color-canvas: #050816;
        --color-canvas-elevated: #09111f;
        --color-canvas-deep: #02050d;
        --color-surface-1: #0d1628;
        --color-surface-2: #121d33;
        --color-surface-3: #182540;
        --color-surface-glass: rgba(11, 18, 34, 0.78);
        --color-border-soft: rgba(148, 167, 201, 0.16);
        --color-border-strong: rgba(168, 186, 219, 0.28);
        --color-text-primary: #f3f7ff;
        --color-text-secondary: #b8c4da;
        --color-text-tertiary: #8e9bb2;
        --color-accent-primary: #7ddcff;
        --color-accent-primary-strong: #94bcff;
        --color-accent-primary-soft: rgba(125, 220, 255, 0.14);
        --color-accent-secondary: #79edd8;
        --color-accent-ink: #04101d;
        --color-status-success: #7ce4b0;
        --color-status-danger: #ff8d98;
        --color-layer-overlay: rgba(2, 7, 17, 0.68);
        --color-backdrop-glow-primary: rgba(148, 188, 255, 0.18);
        --color-backdrop-glow-secondary: rgba(121, 237, 216, 0.14);
        --color-backdrop-glow-depth: rgba(59, 95, 172, 0.26);
        --color-backdrop-star-strong: rgba(255, 255, 255, 0.76);
        --color-backdrop-star-soft: rgba(255, 255, 255, 0.26);
        --color-backdrop-star-accent: rgba(148, 188, 255, 0.48);
        --color-backdrop-star-halo: rgba(255, 255, 255, 0.12);
        --color-backdrop-star-halo-accent: rgba(148, 188, 255, 0.16);
        --radius-panel: 26px;
        --radius-control: 16px;
        --space-2: 0.5rem;
        --space-3: 0.875rem;
        --space-4: 1.25rem;
        --space-5: 1.75rem;
        --space-6: 2.5rem;
        --shadow-panel: 0 24px 64px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        min-height: 100%;
      }

      /* Mirrors /mod/_core/framework/visual.css for the public login shell. */
      body.space-theme-canvas {
        --space-shooting-one-top: 16%;
        --space-shooting-one-left: 10%;
        --space-shooting-one-angle: 18.4deg;
        --space-shooting-one-mid-x: clamp(9rem, 36vmin, 30rem);
        --space-shooting-one-mid-y: clamp(3rem, 12vmin, 10rem);
        --space-shooting-one-end-x: clamp(16.5rem, 66vmin, 54rem);
        --space-shooting-one-end-y: clamp(5.5rem, 22vmin, 18rem);
        --space-shooting-two-top: 19%;
        --space-shooting-two-left: 82%;
        --space-shooting-two-angle: 139deg;
        --space-shooting-two-mid-x: clamp(-24rem, -30vmin, -8rem);
        --space-shooting-two-mid-y: clamp(6rem, 26vmin, 20rem);
        --space-shooting-two-end-x: clamp(-42rem, -56vmin, -14rem);
        --space-shooting-two-end-y: clamp(11rem, 48vmin, 36rem);
        --space-shooting-three-top: 63%;
        --space-shooting-three-left: 17%;
        --space-shooting-three-angle: -21.3deg;
        --space-shooting-three-mid-x: clamp(9rem, 36vmin, 30rem);
        --space-shooting-three-mid-y: clamp(-10rem, -14vmin, -3.5rem);
        --space-shooting-three-end-x: clamp(17rem, 68vmin, 56rem);
        --space-shooting-three-end-y: clamp(-18rem, -26vmin, -6.5rem);
        margin: 0;
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: clamp(0.875rem, 3vw, 2rem);
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(circle at 50% 45%, rgba(148, 188, 255, 0.14) 0%, transparent 27%),
          radial-gradient(circle at 50% 56%, rgba(121, 237, 216, 0.08) 0%, transparent 18%),
          radial-gradient(circle at 18% 18%, var(--color-backdrop-glow-primary) 0%, transparent 28%),
          radial-gradient(circle at 82% 14%, var(--color-backdrop-glow-secondary) 0%, transparent 23%),
          radial-gradient(circle at 50% 120%, var(--color-backdrop-glow-depth) 0%, transparent 38%),
          linear-gradient(180deg, var(--color-canvas-elevated) 0%, var(--color-canvas) 52%, var(--color-canvas-deep) 100%);
        color: var(--color-text-primary);
      }

      .space-parallax {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }

      .space-parallax-layer,
      .space-shooting-stars {
        position: absolute;
        inset: -24vmax;
        pointer-events: none;
      }

      .space-parallax-layer {
        --space-drift-x: 0px;
        --space-drift-y: 0px;
        --space-duration: 1s;
        --space-rotate: 0deg;
        --space-scale: 1;
        background-repeat: repeat;
        background-position: 0 0;
        transform: rotate(var(--space-rotate)) scale(var(--space-scale));
        transform-origin: center;
        contain: paint;
        will-change: background-position;
        animation: space-theme-diagonal-drift var(--space-duration) linear infinite;
      }

      .space-glow-layer {
        --space-rotate: -6deg;
        --space-scale: 1.08;
        inset: -18vmax;
        opacity: 0.68;
        background:
          radial-gradient(circle at 24% 20%, rgba(148, 188, 255, 0.14) 0%, transparent 28%),
          radial-gradient(circle at 78% 16%, rgba(121, 237, 216, 0.1) 0%, transparent 22%),
          radial-gradient(circle at 50% 108%, rgba(59, 95, 172, 0.16) 0%, transparent 34%);
        background-repeat: no-repeat;
        animation: none;
      }

      .space-star-layer-deep {
        --space-drift-x: 208px;
        --space-drift-y: 208px;
        --space-duration: 260s;
        --space-rotate: 6deg;
        --space-scale: 1.04;
        opacity: 0.36;
        background-image:
          radial-gradient(circle at 24px 30px, var(--color-backdrop-star-soft) 0 0.55px, transparent 1.18px),
          radial-gradient(circle at 96px 72px, var(--color-backdrop-star-soft) 0 0.46px, transparent 1.1px),
          radial-gradient(circle at 158px 126px, var(--color-backdrop-star-soft) 0 0.52px, transparent 1.16px),
          radial-gradient(circle at 52px 166px, var(--color-backdrop-star-soft) 0 0.5px, transparent 1.12px),
          radial-gradient(circle at 187px 44px, var(--color-backdrop-star-soft) 0 0.48px, transparent 1.08px),
          radial-gradient(circle at 128px 188px, var(--color-backdrop-star-soft) 0 0.44px, transparent 1.04px),
          radial-gradient(circle at 204px 168px, var(--color-backdrop-star-soft) 0 0.5px, transparent 1.12px);
        background-size: 208px 208px;
      }

      .space-star-layer-far {
        --space-drift-x: 226px;
        --space-drift-y: 226px;
        --space-duration: 170s;
        --space-rotate: -7deg;
        --space-scale: 1.08;
        opacity: 0.56;
        background-image:
          radial-gradient(circle at 28px 22px, var(--color-backdrop-star-soft) 0 0.68px, transparent 1.3px),
          radial-gradient(circle at 92px 84px, var(--color-backdrop-star-strong) 0 0.82px, transparent 1.5px),
          radial-gradient(circle at 146px 44px, var(--color-backdrop-star-soft) 0 0.64px, transparent 1.24px),
          radial-gradient(circle at 188px 134px, var(--color-backdrop-star-soft) 0 0.58px, transparent 1.18px),
          radial-gradient(circle at 64px 168px, var(--color-backdrop-star-accent) 0 0.76px, transparent 1.4px),
          radial-gradient(circle at 206px 198px, var(--color-backdrop-star-soft) 0 0.62px, transparent 1.22px),
          radial-gradient(circle at 118px 206px, var(--color-backdrop-star-soft) 0 0.66px, transparent 1.28px),
          radial-gradient(circle at 222px 84px, var(--color-backdrop-star-strong) 0 0.72px, transparent 1.36px);
        background-size: 226px 226px;
      }

      .space-star-layer-mid {
        --space-drift-x: 238px;
        --space-drift-y: 238px;
        --space-duration: 118s;
        --space-rotate: 3deg;
        --space-scale: 1.11;
        opacity: 0.62;
        background-image:
          radial-gradient(circle at 26px 24px, var(--color-backdrop-star-soft) 0 0.74px, transparent 1.34px),
          radial-gradient(circle at 74px 102px, var(--color-backdrop-star-strong) 0 0.9px, transparent 1.58px),
          radial-gradient(circle at 126px 48px, var(--color-backdrop-star-soft) 0 0.68px, transparent 1.28px),
          radial-gradient(circle at 182px 138px, var(--color-backdrop-star-accent) 0 0.84px, transparent 1.48px),
          radial-gradient(circle at 56px 184px, var(--color-backdrop-star-soft) 0 0.7px, transparent 1.3px),
          radial-gradient(circle at 154px 198px, var(--color-backdrop-star-strong) 0 0.78px, transparent 1.42px),
          radial-gradient(circle at 214px 76px, var(--color-backdrop-star-soft) 0 0.72px, transparent 1.34px),
          radial-gradient(circle at 228px 210px, var(--color-backdrop-star-soft) 0 0.66px, transparent 1.26px);
        background-size: 238px 238px;
      }

      .space-star-layer-near {
        --space-drift-x: 262px;
        --space-drift-y: 262px;
        --space-duration: 82s;
        --space-rotate: 8deg;
        --space-scale: 1.14;
        opacity: 0.76;
        background-image:
          radial-gradient(circle at 36px 28px, var(--color-backdrop-star-halo) 0 2.2px, transparent 5.5px),
          radial-gradient(circle at 36px 28px, var(--color-backdrop-star-strong) 0 0.96px, transparent 1.72px),
          radial-gradient(circle at 136px 88px, var(--color-backdrop-star-halo-accent) 0 2.5px, transparent 6px),
          radial-gradient(circle at 136px 88px, var(--color-backdrop-star-accent) 0 1.04px, transparent 1.82px),
          radial-gradient(circle at 84px 182px, var(--color-backdrop-star-halo) 0 2.3px, transparent 5.6px),
          radial-gradient(circle at 84px 182px, var(--color-backdrop-star-strong) 0 0.92px, transparent 1.68px),
          radial-gradient(circle at 196px 148px, var(--color-backdrop-star-strong) 0 0.84px, transparent 1.5px);
        background-size: 262px 262px;
      }

      .space-star-layer-close {
        --space-drift-x: 304px;
        --space-drift-y: 304px;
        --space-duration: 62s;
        --space-rotate: -11deg;
        --space-scale: 1.18;
        opacity: 0.86;
        background-image:
          radial-gradient(circle at 52px 44px, var(--color-backdrop-star-halo) 0 3px, transparent 7.3px),
          radial-gradient(circle at 52px 44px, var(--color-backdrop-star-strong) 0 1.08px, transparent 1.88px),
          radial-gradient(circle at 186px 164px, var(--color-backdrop-star-halo-accent) 0 3.2px, transparent 7.8px),
          radial-gradient(circle at 186px 164px, var(--color-backdrop-star-accent) 0 1.18px, transparent 2px),
          radial-gradient(circle at 226px 78px, var(--color-backdrop-star-halo) 0 2.8px, transparent 7px),
          radial-gradient(circle at 226px 78px, var(--color-backdrop-star-strong) 0 1.04px, transparent 1.82px),
          radial-gradient(circle at 122px 228px, var(--color-backdrop-star-halo) 0 2.7px, transparent 6.8px),
          radial-gradient(circle at 122px 228px, var(--color-backdrop-star-strong) 0 0.98px, transparent 1.74px);
        background-size: 304px 304px;
      }

      .space-shooting-stars {
        inset: 0;
      }

      .space-shooting-stars::before {
        content: "";
        position: absolute;
        top: var(--space-shooting-one-top);
        left: var(--space-shooting-one-left);
        width: 10rem;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.03) 28%,
          rgba(148, 188, 255, 0.18) 56%,
          rgba(255, 255, 255, 0.96) 100%
        );
        transform-origin: right center;
        filter:
          drop-shadow(0 0 6px rgba(255, 255, 255, 0.5))
          drop-shadow(0 0 18px rgba(148, 188, 255, 0.22));
        opacity: 0;
        will-change: transform, opacity;
        animation: space-theme-shooting-star 6s linear infinite;
      }

      @keyframes space-theme-diagonal-drift {
        from {
          background-position: 0 0;
        }

        to {
          background-position: var(--space-drift-x) var(--space-drift-y);
        }
      }

      @keyframes space-theme-shooting-star {
        0%,
        13% {
          top: var(--space-shooting-one-top);
          left: var(--space-shooting-one-left);
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-one-angle)) scaleX(0.16);
        }

        14% {
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-one-angle)) scaleX(0.22);
        }

        15.2% {
          opacity: 0.95;
          transform:
            translate3d(var(--space-shooting-one-mid-x), var(--space-shooting-one-mid-y), 0)
            rotate(var(--space-shooting-one-angle))
            scaleX(1);
        }

        16.2% {
          opacity: 0;
          transform:
            translate3d(var(--space-shooting-one-end-x), var(--space-shooting-one-end-y), 0)
            rotate(var(--space-shooting-one-angle))
            scaleX(0.44);
        }

        16.3%,
        41% {
          top: var(--space-shooting-one-top);
          left: var(--space-shooting-one-left);
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-one-angle)) scaleX(0.16);
        }

        42% {
          top: var(--space-shooting-two-top);
          left: var(--space-shooting-two-left);
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-two-angle)) scaleX(0.18);
        }

        43.2% {
          opacity: 0.92;
          transform:
            translate3d(var(--space-shooting-two-mid-x), var(--space-shooting-two-mid-y), 0)
            rotate(var(--space-shooting-two-angle))
            scaleX(0.98);
        }

        44.1% {
          opacity: 0;
          transform:
            translate3d(var(--space-shooting-two-end-x), var(--space-shooting-two-end-y), 0)
            rotate(var(--space-shooting-two-angle))
            scaleX(0.42);
        }

        44.2%,
        71% {
          top: var(--space-shooting-two-top);
          left: var(--space-shooting-two-left);
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-two-angle)) scaleX(0.18);
        }

        72% {
          top: var(--space-shooting-three-top);
          left: var(--space-shooting-three-left);
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-three-angle)) scaleX(0.18);
        }

        73.1% {
          opacity: 0.9;
          transform:
            translate3d(var(--space-shooting-three-mid-x), var(--space-shooting-three-mid-y), 0)
            rotate(var(--space-shooting-three-angle))
            scaleX(1.04);
        }

        74% {
          opacity: 0;
          transform:
            translate3d(var(--space-shooting-three-end-x), var(--space-shooting-three-end-y), 0)
            rotate(var(--space-shooting-three-angle))
            scaleX(0.46);
        }

        74.1%,
        100% {
          top: var(--space-shooting-three-top);
          left: var(--space-shooting-three-left);
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-three-angle)) scaleX(0.18);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .space-parallax-layer {
          animation: none;
          transform: rotate(var(--space-rotate)) scale(var(--space-scale));
        }

        .space-shooting-stars::before {
          animation: none;
          opacity: 0;
        }
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(56rem, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(19.5rem, 24rem);
        gap: clamp(1.5rem, 4vw, 3rem);
        align-items: center;
      }

      .intro {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 15.5rem) minmax(6.8rem, 9.8rem);
        gap: clamp(0.7rem, 2.2vw, 1.5rem);
        align-items: center;
        padding-block: clamp(0.5rem, 2vw, 1.5rem);
      }

      .intro-content {
        position: relative;
        z-index: 1;
        min-width: 0;
      }

      .intro-art {
        position: relative;
        min-height: clamp(6.8rem, 15vw, 9.8rem);
        display: grid;
        place-items: center;
      }

      .intro-astronaut {
        --astronaut-float-x: 0px;
        --astronaut-float-y: 0px;
        --astronaut-rotate: 0deg;
        position: relative;
        z-index: 0;
        width: clamp(6.9rem, 15vw, 9.8rem);
        opacity: 0.94;
        pointer-events: none;
        user-select: none;
        transform:
          translate3d(var(--astronaut-float-x), var(--astronaut-float-y), 0)
          rotate(var(--astronaut-rotate));
        transform-origin: 52% 56%;
        filter:
          drop-shadow(0 10px 22px rgba(0, 0, 0, 0.32))
          drop-shadow(0 0 18px rgba(148, 188, 255, 0.14));
        will-change: transform;
      }

      h1 {
        margin: 0 0 0.85rem;
        max-width: 7ch;
        font-size: clamp(2.7rem, 7vw, 4.6rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .intro-copy {
        max-width: 17rem;
        margin: 0;
        color: var(--color-text-secondary);
        font-size: 1rem;
        line-height: 1.5;
      }

      .login-panel {
        position: relative;
        padding: clamp(var(--space-4), 3vw, 1.65rem);
        border-radius: var(--radius-panel);
        background: linear-gradient(180deg, rgba(10, 17, 31, 0.9), rgba(7, 13, 24, 0.82));
        border: 1px solid var(--color-border-soft);
        box-shadow:
          var(--shadow-panel),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(18px);
      }

      h2,
      h3 {
        margin: 0;
        letter-spacing: -0.03em;
      }

      h2 {
        font-size: 1.65rem;
      }

      .panel-copy {
        margin: 0.45rem 0 0;
        color: var(--color-text-secondary);
        line-height: 1.55;
      }

      label {
        display: grid;
        gap: 0.4rem;
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      form {
        display: grid;
        gap: var(--space-3);
        margin-top: 1.1rem;
      }

      input {
        width: 100%;
        border: 1px solid var(--color-border-soft);
        border-radius: var(--radius-control);
        padding: 0.86rem 0.95rem;
        font: inherit;
        background: rgba(255, 255, 255, 0.035);
        color: var(--color-text-primary);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        transition:
          border-color 160ms ease,
          background-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      input::placeholder {
        color: var(--color-text-tertiary);
      }

      input:hover {
        border-color: rgba(168, 186, 219, 0.24);
        background: rgba(255, 255, 255, 0.05);
      }

      input:focus-visible {
        outline: none;
        border-color: rgba(125, 220, 255, 0.5);
        background: rgba(255, 255, 255, 0.06);
        box-shadow:
          0 0 0 4px rgba(125, 220, 255, 0.12),
          0 0 24px rgba(148, 188, 255, 0.12);
      }

      input[readonly] {
        color: var(--color-text-primary);
        cursor: text;
        background: rgba(255, 255, 255, 0.055);
        border-color: rgba(168, 186, 219, 0.24);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 0 0 1px rgba(125, 220, 255, 0.04);
      }

      button {
        border: 0;
        border-radius: var(--radius-control);
        padding: 0.88rem 1rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          background-color 160ms ease,
          border-color 160ms ease,
          opacity 160ms ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(125, 220, 255, 0.12);
      }

      .primary-button {
        color: var(--color-accent-ink);
        background: linear-gradient(
          135deg,
          var(--color-accent-primary-strong) 0%,
          var(--color-accent-secondary) 100%
        );
        box-shadow: 0 12px 26px rgba(59, 163, 186, 0.24);
      }

      .primary-button:hover:not(:disabled) {
        box-shadow: 0 16px 30px rgba(59, 163, 186, 0.28);
      }

      button:disabled {
        opacity: 0.68;
        cursor: not-allowed;
        transform: none;
      }

      .secondary-button {
        width: 100%;
        color: var(--color-text-primary);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--color-border-soft);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .secondary-button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--color-border-strong);
      }

      .login-separator {
        margin: 1.75rem 0 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--color-text-tertiary);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .login-separator::before,
      .login-separator::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(148, 167, 201, 0.22), transparent);
      }

      .field-note {
        margin: -0.15rem 0 0;
        color: var(--color-text-tertiary);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .status {
        margin-top: 0;
        font-size: 0.88rem;
        line-height: 1.45;
        overflow-wrap: anywhere;
        color: var(--color-text-secondary);
      }

      .status:not(:empty) {
        margin-top: 0.9rem;
      }

      .status.error {
        color: var(--color-status-danger);
      }

      .status.ok {
        color: var(--color-status-success);
      }

      @media (max-width: 760px) {
        body.space-theme-canvas {
          padding: 0.85rem;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 1rem;
        }

        .intro {
          width: fit-content;
          max-width: 100%;
          grid-template-columns: minmax(0, 12.6rem) clamp(8.1rem, 36vw, 10.2rem);
          gap: 0.2rem;
          justify-content: start;
          padding-block: 0;
        }

        .intro-content {
          max-width: 12.6rem;
        }

        .intro-art {
          min-height: clamp(8.1rem, 36vw, 10.2rem);
          justify-items: start;
        }

        .intro-astronaut {
          width: clamp(8.1rem, 36vw, 10.2rem);
        }

        h1 {
          max-width: 6.3ch;
          font-size: clamp(2.25rem, 12vw, 3.3rem);
        }

        .intro-copy {
          max-width: 11.6rem;
          font-size: 0.9rem;
          line-height: 1.42;
        }
      }

      @media (max-width: 520px) {
        .intro {
          grid-template-columns: minmax(0, 10.8rem) clamp(7.35rem, 36vw, 8.85rem);
        }

        .intro-content {
          max-width: 10.8rem;
        }

        .intro-art {
          min-height: clamp(7.35rem, 36vw, 8.85rem);
          justify-items: start;
        }

        .intro-astronaut {
          width: clamp(7.35rem, 36vw, 8.85rem);
          opacity: 0.9;
        }

        .login-panel {
          padding: 1rem;
          border-radius: 22px;
        }

        .intro-copy,
        .panel-copy,
        .field-note {
          font-size: 0.95rem;
          line-height: 1.5;
        }

        input,
        button {
          padding-block: 0.82rem;
        }
      }
    </style>
  </head>
  <body class="space-theme-canvas">
    <div class="space-parallax" aria-hidden="true">
      <div class="space-parallax-layer space-glow-layer"></div>
      <div class="space-parallax-layer space-star-layer-deep"></div>
      <div class="space-parallax-layer space-star-layer-far"></div>
      <div class="space-parallax-layer space-star-layer-mid"></div>
      <div class="space-parallax-layer space-star-layer-near"></div>
      <div class="space-parallax-layer space-star-layer-close"></div>
      <div class="space-shooting-stars"></div>
    </div>
    <main class="shell">
      <section class="intro" aria-label="Space Agent overview">
        <div class="intro-content">
          <h1>Space Agent</h1>
          <p class="intro-copy">
            AI agent that builds your space,<br />
            right in the browser.
          </p>
        </div>
        <div class="intro-art" aria-hidden="true">
          <img
            id="intro-astronaut"
            class="intro-astronaut"
            src="/pages/res/astronaut_no_bg.webp"
            alt=""
            decoding="async"
          />
        </div>
      </section>

      <section class="login-panel" aria-label="Login form">
        <h2>Sign in</h2>
        <form id="login-form">
          <label>
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <p id="field-note" class="field-note" hidden>
            Guest account ready, save your credentials!
          </p>
          <button id="submit-button" class="primary-button" type="submit">Enter your Space</button>
        </form>
        <div id="login-separator" class="login-separator">or</div>
        <button id="guest-create-button" class="secondary-button" type="button">
          Create Temporary Guest Account
        </button>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script>
      const LOGIN_PREFIX = "space-login-v1";
      const CLIENT_KEY_LABEL = "Client Key";
      const SERVER_KEY_LABEL = "Server Key";
      const ASTRONAUT_FLOAT_PROFILE = Object.freeze({
        blend: Object.freeze({
          positionMs: 1280,
          rotationMs: 5200
        }),
        drift: Object.freeze({
          rotate: Object.freeze({
            primaryAmplitude: 3.8,
            primaryPeriodMs: 7600,
            secondaryAmplitude: 1.9,
            secondaryPeriodMs: 4100
          }),
          x: Object.freeze({
            primaryAmplitude: 7.5,
            primaryPeriodMs: 4200,
            secondaryAmplitude: 3.4,
            secondaryPeriodMs: 2150
          }),
          y: Object.freeze({
            primaryAmplitude: 8.6,
            primaryPeriodMs: 5000,
            secondaryAmplitude: 3.6,
            secondaryPeriodMs: 2720
          })
        }),
        wander: Object.freeze({
          intervalMaxMs: 5200,
          intervalMinMs: 2600,
          rotateRange: 8,
          xRange: 16,
          yRange: 13
        })
      });
      const textEncoder = new TextEncoder();
      const form = document.getElementById("login-form");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const fieldNote = document.getElementById("field-note");
      const loginSeparator = document.getElementById("login-separator");
      const submitButton = document.getElementById("submit-button");
      const guestCreateButton = document.getElementById("guest-create-button");
      const introAstronaut = document.getElementById("intro-astronaut");
      const statusEl = document.getElementById("status");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      let guestCredentials = null;
      let astronautFloatFrame = 0;
      let astronautFloatLastTime = 0;
      let astronautFloatStartTime = 0;
      let astronautNextTargetAt = 0;
      let astronautCurrentX = 0;
      let astronautCurrentY = 0;
      let astronautCurrentRotation = 0;
      let astronautTargetX = 0;
      let astronautTargetY = 0;
      let astronautTargetRotation = 0;

      function setStatus(message, tone = "") {
        statusEl.textContent = message;
        statusEl.className = tone ? `status ${tone}` : "status";
      }

      function syncButtonState(isBusy = false) {
        submitButton.disabled = isBusy;
        guestCreateButton.disabled = isBusy;
      }

      function setAstronautPose(x, y, rotation) {
        if (!introAstronaut) {
          return;
        }

        introAstronaut.style.setProperty("--astronaut-float-x", `${x.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-float-y", `${y.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-rotate", `${rotation.toFixed(1)}deg`);
      }

      function chooseAstronautTarget(timestamp) {
        const { wander } = ASTRONAUT_FLOAT_PROFILE;

        astronautTargetX = Math.random() * wander.xRange * 2 - wander.xRange;
        astronautTargetY = Math.random() * wander.yRange * 2 - wander.yRange;
        astronautTargetRotation = Math.random() * wander.rotateRange * 2 - wander.rotateRange;
        astronautNextTargetAt = timestamp + wander.intervalMinMs + Math.random() * (wander.intervalMaxMs - wander.intervalMinMs);
      }

      function getAstronautDrift(elapsed, axisProfile, secondaryOffset = 0) {
        const primaryWave = Math.sin(elapsed / axisProfile.primaryPeriodMs) * axisProfile.primaryAmplitude;
        const secondaryWave =
          Math.cos(elapsed / axisProfile.secondaryPeriodMs + secondaryOffset) * axisProfile.secondaryAmplitude;

        return primaryWave + secondaryWave;
      }

      function stepAstronautFloat(timestamp) {
        if (!introAstronaut) {
          astronautFloatFrame = 0;
          return;
        }

        if (prefersReducedMotion.matches) {
          astronautFloatFrame = 0;
          astronautFloatLastTime = 0;
          astronautFloatStartTime = 0;
          astronautNextTargetAt = 0;
          astronautCurrentX = 0;
          astronautCurrentY = 0;
          astronautCurrentRotation = 0;
          astronautTargetX = 0;
          astronautTargetY = 0;
          astronautTargetRotation = 0;
          setAstronautPose(0, 0, 0);
          return;
        }

        if (!astronautFloatLastTime) {
          astronautFloatLastTime = timestamp;
        }

        if (!astronautFloatStartTime) {
          astronautFloatStartTime = timestamp;
        }

        if (!astronautNextTargetAt || timestamp >= astronautNextTargetAt) {
          chooseAstronautTarget(timestamp);
        }

        const delta = Math.min(timestamp - astronautFloatLastTime, 40);
        const elapsed = timestamp - astronautFloatStartTime;
        astronautFloatLastTime = timestamp;

        const positionBlend = 1 - Math.exp(-delta / ASTRONAUT_FLOAT_PROFILE.blend.positionMs);
        const rotationBlend = 1 - Math.exp(-delta / ASTRONAUT_FLOAT_PROFILE.blend.rotationMs);
        const driftX = getAstronautDrift(elapsed, ASTRONAUT_FLOAT_PROFILE.drift.x, 0.65);
        const driftY = getAstronautDrift(elapsed + 420, ASTRONAUT_FLOAT_PROFILE.drift.y, 1.15);
        const driftRotation = getAstronautDrift(elapsed + 930, ASTRONAUT_FLOAT_PROFILE.drift.rotate, 0.35);

        astronautCurrentX += (astronautTargetX - astronautCurrentX) * positionBlend;
        astronautCurrentY += (astronautTargetY - astronautCurrentY) * positionBlend;
        astronautCurrentRotation += (astronautTargetRotation - astronautCurrentRotation) * rotationBlend;

        setAstronautPose(
          astronautCurrentX + driftX,
          astronautCurrentY + driftY,
          astronautCurrentRotation + driftRotation
        );
        astronautFloatFrame = window.requestAnimationFrame(stepAstronautFloat);
      }

      function startAstronautFloat() {
        window.cancelAnimationFrame(astronautFloatFrame);
        astronautFloatFrame = 0;
        astronautFloatLastTime = 0;
        astronautFloatStartTime = 0;
        astronautNextTargetAt = 0;
        astronautCurrentX = 0;
        astronautCurrentY = 0;
        astronautCurrentRotation = 0;
        astronautTargetX = 0;
        astronautTargetY = 0;
        astronautTargetRotation = 0;
        setAstronautPose(0, 0, 0);

        if (!introAstronaut || prefersReducedMotion.matches) {
          return;
        }

        window.requestAnimationFrame(() => {
          astronautFloatFrame = window.requestAnimationFrame(stepAstronautFloat);
        });
      }

      function setGuestCredentials(credentials) {
        guestCredentials =
          credentials && credentials.username && credentials.password
            ? {
                password: credentials.password,
                username: credentials.username
              }
            : null;

        const isGuestReady = Boolean(guestCredentials);

        if (isGuestReady) {
          usernameInput.value = guestCredentials.username;
          passwordInput.value = guestCredentials.password;
        }

        usernameInput.readOnly = isGuestReady;
        passwordInput.readOnly = isGuestReady;
        passwordInput.type = isGuestReady ? "text" : "password";
        submitButton.textContent = isGuestReady ? "Continue" : "Enter your Space";
        fieldNote.hidden = !isGuestReady;
        loginSeparator.hidden = isGuestReady;
        guestCreateButton.hidden = isGuestReady;
        syncButtonState(false);
      }

      function toBase64Url(bytes) {
        let text = "";
        bytes.forEach((value) => {
          text += String.fromCharCode(value);
        });
        return btoa(text).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function fromBase64Url(value) {
        const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
        const padding = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));
        const decoded = atob(normalized + padding);
        return Uint8Array.from(decoded, (char) => char.charCodeAt(0));
      }

      function xorBytes(left, right) {
        if (left.length !== right.length) {
          throw new Error("Mismatched proof length.");
        }

        const output = new Uint8Array(left.length);

        for (let index = 0; index < left.length; index += 1) {
          output[index] = left[index] ^ right[index];
        }

        return output;
      }

      async function sha256(value) {
        const source = typeof value === "string" ? textEncoder.encode(value) : value;
        return new Uint8Array(await crypto.subtle.digest("SHA-256", source));
      }

      async function hmacSha256(keyBytes, value) {
        const key = await crypto.subtle.importKey(
          "raw",
          keyBytes,
          {
            name: "HMAC",
            hash: "SHA-256"
          },
          false,
          ["sign"]
        );

        return new Uint8Array(await crypto.subtle.sign("HMAC", key, textEncoder.encode(value)));
      }

      async function deriveSaltedPassword(password, salt, iterations) {
        const passwordKey = await crypto.subtle.importKey(
          "raw",
          textEncoder.encode(password),
          "PBKDF2",
          false,
          ["deriveBits"]
        );

        const bits = await crypto.subtle.deriveBits(
          {
            name: "PBKDF2",
            hash: "SHA-256",
            iterations,
            salt: fromBase64Url(salt)
          },
          passwordKey,
          256
        );

        return new Uint8Array(bits);
      }

      async function postJson(path, body) {
        const response = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "Request failed.");
        }

        return payload;
      }

      function createNonce() {
        const bytes = new Uint8Array(24);
        crypto.getRandomValues(bytes);
        return toBase64Url(bytes);
      }

      async function handleLogin(event) {
        event.preventDefault();
        setStatus("Signing in...");
        syncButtonState(true);

        try {
          const username = usernameInput.value.trim();
          const password = passwordInput.value;

          if (!username || !password) {
            throw new Error("Username and password are required.");
          }

          const clientNonce = createNonce();
          const challenge = await postJson("/api/login_challenge", {
            clientNonce,
            username
          });
          const saltedPassword = await deriveSaltedPassword(
            password,
            challenge.salt,
            Number(challenge.iterations)
          );
          const clientKey = await hmacSha256(saltedPassword, CLIENT_KEY_LABEL);
          const storedKey = await sha256(clientKey);
          const authMessage = [
            LOGIN_PREFIX,
            username,
            clientNonce,
            challenge.serverNonce,
            challenge.challengeToken
          ].join(":");
          const clientSignature = await hmacSha256(storedKey, authMessage);
          const clientProof = xorBytes(clientKey, clientSignature);
          const loginResult = await postJson("/api/login", {
            challengeToken: challenge.challengeToken,
            clientProof: toBase64Url(clientProof)
          });
          const serverKey = await hmacSha256(saltedPassword, SERVER_KEY_LABEL);
          const expectedServerSignature = await hmacSha256(serverKey, authMessage);

          if (toBase64Url(expectedServerSignature) !== loginResult.serverSignature) {
            throw new Error("Server signature check failed.");
          }

          setStatus("Signed in. Redirecting...", "ok");
          window.location.replace("/");
        } catch (error) {
          setStatus(error.message || "Sign-in failed.", "error");
          syncButtonState(false);
          passwordInput.select();
        }
      }

      async function handleGuestCreate() {
        setStatus("Creating guest account...");
        syncButtonState(true);

        try {
          const guestAccount = await postJson("/api/guest_create", {});
          setGuestCredentials(guestAccount);
          setStatus("");
        } catch (error) {
          syncButtonState(false);
          setStatus(error.message || "Guest account creation failed.", "error");
        }
      }

      form.addEventListener("submit", handleLogin);
      guestCreateButton.addEventListener("click", handleGuestCreate);
      usernameInput.addEventListener("focus", () => {
        if (usernameInput.readOnly) {
          usernameInput.select();
        }
      });
      passwordInput.addEventListener("focus", () => {
        if (passwordInput.readOnly) {
          passwordInput.select();
        }
      });
      if (typeof prefersReducedMotion.addEventListener === "function") {
        prefersReducedMotion.addEventListener("change", startAstronautFloat);
      } else if (typeof prefersReducedMotion.addListener === "function") {
        prefersReducedMotion.addListener(startAstronautFloat);
      }
      syncButtonState(false);
      if (introAstronaut && !introAstronaut.complete) {
        introAstronaut.addEventListener("load", startAstronautFloat, { once: true });
      } else {
        startAstronautFloat();
      }
    </script>
  </body>
</html>
